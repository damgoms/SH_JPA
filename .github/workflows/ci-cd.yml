name: CI/CD Pipeline
on:
  push:
    branches:
      - master

permissions:
  contents: read
  packages: write
        
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # [추가] Java 빌드 단계 (이게 없으면 도커 이미지가 빈 깡통이 됨)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build -x test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/my-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. GHCR 로그인 (EC2에서 이미지를 받아오기 위해 필요)
            echo ${{ secrets.GITHUB_TOKEN }} | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 2. 최신 이미지 가져오기 및 재시작
            sudo docker pull ghcr.io/${{ github.repository_owner }}/my-app:latest
            sudo docker stop my-app || true
            sudo docker rm my-app || true
            # 80번 포트로 들어오면 스프링 8080으로 연결
            sudo docker run -d --name my-app -p 80:8080 ghcr.io/${{ github.repository_owner }}/my-app:latest